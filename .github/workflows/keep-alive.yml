name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes — prevents Render free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CKD Guardian backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ckdguardian.onrender.com/ping --max-time 30)
          echo "Backend ping status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned status $STATUS — may be waking up"
          fi
