name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping CKD Guardian backend
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" \
            --max-time 90 \
            -H "X-API-Key: ckdguardian-secure-key-2026" \
            https://ckd-guardian-backend.onrender.com/health || echo "000")

          echo "Backend health status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend did not return 200. It may be waking up or temporarily slow."
            echo "Not failing workflow to avoid repeated GitHub email spam."
          fi