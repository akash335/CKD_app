name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes to keep Render backend awake
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping CKD Guardian backend
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -H "X-API-Key: ckdguardian-secure-key-2026" \
            https://ckd-guardian-backend.onrender.com/health)

          echo "Backend health status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned status $STATUS"
            exit 1
          fi